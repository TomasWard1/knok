name: Promote to Main

on:
  push:
    branches: [staging]

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if there's already an open PR from staging to main
          existing=$(gh pr list --base main --head staging --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            echo "PR #$existing already exists"
            exit 0
          fi

          gh pr create \
            --base main \
            --head staging \
            --title "chore: promote staging to main" \
            --body "Automated PR to promote staging changes to main."
