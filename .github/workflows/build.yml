name: CI

on:
  pull_request:
    branches: [staging, main]
  push:
    branches: [staging]

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build all targets
        run: swift build

      - name: Run tests
        run: swift test

      - name: Build release
        run: swift build -c release
